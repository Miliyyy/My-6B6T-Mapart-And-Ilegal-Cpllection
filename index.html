<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Miliyyy My 6B6T Mapart And Illegal Collection</title>

  <style>

    body {
      margin: 0;
      padding: 25px;
      background-color: #0b0b0b;
      color: white;
      font-family: Arial, sans-serif;
    }

    h1 {
      text-align: center;
      font-size: 52px;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      color: #8f8f8f;
      margin-bottom: 35px;
      font-size: 18px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
      gap: 25px;
    }

    .card {
      background-color: #171717;
      border-radius: 18px;
      overflow: hidden;
      transition: 0.2s;
      box-shadow: 0px 0px 18px rgba(0,0,0,0.4);
    }

    .card:hover {
      transform: scale(1.01);
    }

    .card img {
      width: 100%;
      display: block;
      cursor: pointer;
    }

    .content {
      display: flex;
      justify-content: space-between;
      gap: 15px;
      padding: 15px;
    }

    .left {
      flex: 2;
      text-align: left;
    }

    .title {
      font-size: 24px;
      margin-bottom: 10px;
    }

    .desc {
      color: #9d9d9d;
      font-size: 14px;
    }

    .right {
      flex: 1;
      background-color: #101010;
      border-radius: 12px;
      padding: 12px;
      text-align: left;
    }

    .info-title {
      font-size: 15px;
      color: #bbbbbb;
      margin-bottom: 8px;
    }

    .info-line {
      font-size: 14px;
      color: #8a8a8a;
      margin-bottom: 6px;
    }

    /* popup viewer */

    .popup {
      display: none;
      position: fixed;
      z-index: 999;
      padding-top: 40px;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.92);
    }

    .popup img {
      margin: auto;
      display: block;
      max-width: 90%;
      max-height: 85%;
      border-radius: 14px;
    }

    .close {
      position: absolute;
      top: 20px;
      right: 35px;
      color: white;
      font-size: 45px;
      cursor: pointer;
    }

  </style>
</head>

<body>

  <h1>Miliyyy My 6B6T Mapart And Illegal Collection</h1>

  <div class="subtitle">
    Private archive showcase
  </div>

  <div class="gallery">

    <!-- MAPART 1 -->

    <div class="card">

      <img src="1.png" onclick="openPopup(this.src)">

      <div class="content">

        <div class="left">
          <div class="title">Mapart #1</div>
          <div class="desc">
            Add your description here
          </div>
        </div>

        <div class="right">
          <div class="info-title">Info</div>

          <div class="info-line">Type: Carpet</div>
          <div class="info-line">Size: 1x1</div>
          <div class="info-line">Server: 6b6t</div>
          <div class="info-line">Artist: Unknown</div>
        </div>

      </div>

    </div>

    <!-- MAPART 2 -->

    <div class="card">

      <img src="2.png" onclick="openPopup(this.src)">

      <div class="content">

        <div class="left">
          <div class="title">Mapart #2</div>
          <div class="desc">
            Add your description here
          </div>
        </div>

        <div class="right">
          <div class="info-title">Info</div>

          <div class="info-line">Type: Printed</div>
          <div class="info-line">Size: 2x2</div>
          <div class="info-line">Server: 6b6t</div>
          <div class="info-line">Artist: Unknown</div>
        </div>

      </div>

    </div>

  </div>

  <!-- IMAGE POPUP -->

  <div id="popup" class="popup">

    <span class="close" onclick="closePopup()">&times;</span>

    <img id="popup-img">

  </div>

  <script>

    function openPopup(src) {
      document.getElementById("popup").style.display = "block";
      document.getElementById("popup-img").src = src;
    }

    function closePopup() {
      document.getElementById("popup").style.display = "none";
    }

  </script>

</body>
</html>
