<!DOCTYPE html>
<html>
<head>
  <title>6b6t Mapart Archive</title>

  <style>
    body {
      background-color: #111;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: 50px;
    }

    .gallery {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }

    .card {
      background: #1e1e1e;
      padding: 15px;
      border-radius: 12px;
      width: 420px;
    }

    img {
      width: 100%;
      border-radius: 10px;
    }

    p {
      font-size: 18px;
    }
  </style>
</head>

<body>

<h1>6b6t Mapart Archive</h1>

<p>My personal mapart collection.</p>

<div class="gallery">

  <div class="card">
    <img src="image1.png">
    <p>Album Cover #1</p>
  </div>

  <div class="card">
    <img src="image2.png">
    <p>Music Mapart</p>
  </div>

</div>

</body>
</html>
